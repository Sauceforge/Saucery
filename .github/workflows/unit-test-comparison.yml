name: Unit Test Comparison

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

env:
  SAUCE_USER_NAME: ${{ secrets.SAUCE_USER_NAME }}
  SAUCE_API_KEY: ${{ secrets.SAUCE_API_KEY }}
  TUNIT_TESTS: "Saucery.Core.Tests"
  NUNIT_TESTS: "Saucery.Core.Tests.NUnit"
  XUNIT_TESTS: "Saucery.Core.Tests.XUnit"
  XUNIT3_TESTS: "Saucery.Core.Tests.XUnitv3"
  TEST_384: "Saucery.Core.Tests.384"
  TEST_576: "Saucery.Core.Tests.576"
  TEST_768: "Saucery.Core.Tests.768"
  TEST_960: "Saucery.Core.Tests.960"
  TEST_1152: "Saucery.Core.Tests.1152"
  TEST_1344: "Saucery.Core.Tests.1344"
  TEST_1536: "Saucery.Core.Tests.1536"
  TEST_1728: "Saucery.Core.Tests.1728"
  TEST_1920: "Saucery.Core.Tests.1920"

jobs:
  run-tunit:
    name: Run TUnit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/Directory.Packages.props', '**/global.json', '**/NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: |
          set -e
          PROJECT_PATH="${{ env.TUNIT_TESTS }}/${{ env.TUNIT_TESTS }}.csproj"
          if [ ! -f "$PROJECT_PATH" ]; then
            echo "TUnit project not found at $PROJECT_PATH"
            find . -maxdepth 3 -name "${{ env.TUNIT_TESTS }}.csproj" -print
            exit 2
          fi
          dotnet run --project "$PROJECT_PATH" --configuration Release --no-build

  test-xunit:
    name: Run XUnit Tests
    needs: run-tunit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/Directory.Packages.props', '**/global.json', '**/NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.XUNIT_TESTS }}/${{ env.XUNIT_TESTS }}.csproj

      - name: Test
        run: dotnet test ${{ env.XUNIT_TESTS }}/${{ env.XUNIT_TESTS }}.csproj --configuration Release --nologo -v normal

  test-xunitv3:
