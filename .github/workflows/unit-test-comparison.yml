name: Unit Test Comparison

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

env:
  SAUCE_USER_NAME: ${{ secrets.SAUCE_USER_NAME }}
  SAUCE_API_KEY: ${{ secrets.SAUCE_API_KEY }}

jobs:
  run-tunit:
    name: Run TUnit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/Directory.Packages.props', '**/global.json', '**/NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: |
          set -e
          PROJECT_PATH="Saucery.Core.Tests/Saucery.Core.Tests.csproj"
          if [ ! -f "$PROJECT_PATH" ]; then
            echo "TUnit project not found at $PROJECT_PATH"
            find . -maxdepth 3 -name "Saucery.Core.Tests.csproj" -print
            exit 2
          fi
          dotnet run --project "$PROJECT_PATH" --configuration Release --no-build

  test-xunit:
    name: Run XUnit Tests
    needs: run-tunit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/Directory.Packages.props', '**/global.json', '**/NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Saucery.Core.Tests.XUnit/Saucery.Core.Tests.XUnit.csproj

      - name: Test
        run: dotnet test Saucery.Core.Tests.XUnit/Saucery.Core.Tests.XUnit.csproj --configuration Release --nologo -v normal

  test-xunitv3:
    name: Run XUnitv3 Tests
    needs: test-xunit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/Directory.Packages.props', '**/global.json', '**/NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Saucery.Core.Tests.XUnitv3/Saucery.Core.Tests.XUnitv3.csproj

      - name: Test
        run: dotnet test Saucery.Core.Tests.XUnitv3/Saucery.Core.Tests.XUnitv3.csproj --configuration Release --nologo -v normal

  test-nunit:
    name: Run NUnit Tests
    needs: test-xunitv3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/Directory.Packages.props', '**/global.json', '**/NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Saucery.Core.Tests.NUnit/Saucery.Core.Tests.NUnit.csproj

      - name: Test
        run: dotnet test Saucery.Core.Tests.NUnit/Saucery.Core.Tests.NUnit.csproj --configuration Release --nologo -v normal