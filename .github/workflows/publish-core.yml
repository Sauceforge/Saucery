name: Publish Saucery.Core to NuGet

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_NAME: Saucery.Core
  PROJECT_PATH: Saucery.Core/Saucery.Core.csproj
  PACKAGE_ID: Saucery.Core
  CONFIG: Release
  NUPKG_DIR: out
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  NUGET_USER: Sauceforge
  DOTNET_VERSION: 10.0.x
  PUBLISH_MODE: local-version-newer

jobs:
  publish:
    name: build, pack & publish Saucery.Core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: nuget-publish

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup dotnet
        uses: ./.github/actions/setup-dotnet
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build, pack and publish package
        id: publish
        uses: ./.github/actions/publish-saucery-package
        with:
          project-path: ${{ env.PROJECT_PATH }}
          package-id: ${{ env.PACKAGE_ID }}
          configuration: ${{ env.CONFIG }}
          nupkg-dir: ${{ env.NUPKG_DIR }}
          nuget-source: ${{ env.NUGET_SOURCE }}
          nuget-user: ${{ env.NUGET_USER }}
          publish-mode: ${{ env.PUBLISH_MODE }}

      - name: Publish outcome
        shell: pwsh
        run: |
          Write-Host "Package version: ${{ steps.publish.outputs.version }}"
          Write-Host "Should publish:   ${{ steps.publish.outputs.should-publish }}"
          Write-Host "Published:        ${{ steps.publish.outputs.published }}"
