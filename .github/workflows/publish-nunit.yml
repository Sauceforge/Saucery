name: Publish Saucery to NuGet

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_NAME: Saucery
  PROJECT_PATH: Saucery/Saucery.csproj
  PACKAGE_ID: Saucery
  CONFIG: Release
  NUPKG_DIR: out
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  DOTNET_VERSION: 10.0.x
  PUBLISH_MODE: local-version-newer
  BUILD_MODE: solution

jobs:
  publish:
    name: build, pack & publish Saucery
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: nuget-publish

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup dotnet
        uses: ./.github/actions/setup-dotnet
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build, pack and publish package
        uses: ./.github/actions/publish-nuget-package
        with:
          project-path: ${{ env.PROJECT_PATH }}
          package-id: ${{ env.PACKAGE_ID }}
          configuration: ${{ env.CONFIG }}
          nupkg-dir: ${{ env.NUPKG_DIR }}
          nuget-source: ${{ env.NUGET_SOURCE }}
          nuget-api-key: ${{ secrets.NUGET_API_KEY }}
          publish-mode: ${{ env.PUBLISH_MODE }}
          build-mode: ${{ env.BUILD_MODE }}
