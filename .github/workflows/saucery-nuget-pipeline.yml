name: Saucery.NuGet

on:
  push:
    paths:
      - '.github/workflows/saucery-nuget-pipeline.yml'
      - 'Saucery.NuGet/**'
      - 'Saucery.NuGet.Tests/**'
    branches:
      - master
      - 'releases/**'
      - 'feat/**'
      - 'feature/**'
      - 'fix/**'
      - 'test/**'
  workflow_dispatch:

env:
  SOLN_FILE: Saucery.sln
  CONFIG: Release

  PROJECT_PATH: Saucery.NuGet/Saucery.NuGet.csproj
  TEST_PROJECT: Saucery.NuGet.Tests/Saucery.NuGet.Tests.csproj
  PACKAGE_ID: Saucery.NuGet

  ARTIFACT_DIR: artifacts
  COVERLET_DIR: ./TestResults
  COVERAGE_FORMAT: cobertura
  UNIT_COVERAGE_FILENAME: cobertura.unit.xml

  WATCHED_GLOBS: |
    .github/workflows/saucery-nuget-pipeline.yml
    Saucery.NuGet/**
    Saucery.NuGet.Tests/**

permissions:
  contents: write

jobs:
  detect-changes:
    name: Detect watched path changes since last completed run
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      changed: ${{ steps.decide.outputs.changed }}
      previous_sha: ${{ steps.decide.outputs.previous_sha }}
      paths_changed: ${{ steps.decide.outputs.paths_changed }}
    steps:
      - name: Resolve last completed run head_sha for this workflow+branch AND check paths
        id: decide
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const workflow_id = ".github/workflows/saucery-nuget-pipeline.yml";

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              branch,
              status: "completed",
              per_page: 1
            });

            const prevSha = runs.data.workflow_runs[0]?.head_sha || "";
            const curSha = context.sha;

            core.info(`Event:       ${context.eventName}`);
            core.info(`Branch:      ${branch}`);
            core.info(`Current SHA: ${curSha}`);
            core.info(`Prev SHA:    ${prevSha || "<none>"}`);

            let changed = "true";
            let pathsChanged = "true";

            const raw = process.env.WATCHED_GLOBS || "";
            const watchedGlobs = raw
              .split(/[\n,]+/g)
              .map(x => x.trim())
              .filter(Boolean);

            core.info(`WATCHED_GLOBS (parsed): [${watchedGlobs.join(", ")}]`);

            function globToRegexSource(pattern) {
              let out = "";
              for (let i = 0; i < pattern.length; i++) {
                const ch = pattern[i];
                if (ch === "*") {
                  const nextIsStar = i + 1 < pattern.length && pattern[i + 1] === "*";
                  if (nextIsStar) {
                    out += ".*";
                    i++;
                  } else {
                    out += "[^/]*";
                  }
                } else if (ch === "/") {
                  out += "\\/";
                } else if ("\\.[]{}()+-?^$|".includes(ch)) {
                  out += "\\" + ch;
                } else {
                  out += ch;
                }
              }
              return out;
            }

            function matchesGlob(path, pattern) {
              const source = globToRegexSource(pattern);
              const regex = new RegExp("^" + source + "$");
              return regex.test(path);
            }

            if (!prevSha) {
              core.info("No previous completed run for this workflow+branch. Treating as changed.");
              changed = "true";
              pathsChanged = "true";
            } else if (prevSha === curSha) {
              core.info("No new commits since last completed run on this branch.");
              changed = "false";
              pathsChanged = "false";
            } else {
              const comparison = await github.rest.repos.compareCommits({
                owner,
                repo,
                base: prevSha,
                head: curSha
              });

              const files = comparison.data.files || [];
              const changedPaths = files.map(f => f.filename);

              core.info("Changed files since last run:");
              if (changedPaths.length === 0) {
                core.info(" (none reported by compareCommits)");
              } else {
                for (const p of changedPaths) core.info(` - ${p}`);
              }

              if (watchedGlobs.length === 0) {
                pathsChanged = "true";
              } else {
                const matches = changedPaths.some(path =>
                  watchedGlobs.some(pattern => matchesGlob(path, pattern))
                );
                pathsChanged = matches ? "true" : "false";
              }
            }

            core.setOutput("changed", changed);
            core.setOutput("paths_changed", pathsChanged);
            core.setOutput("previous_sha", prevSha);

  build-and-test:
    name: Build and run Saucery.NuGet unit tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.paths_changed == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore "${{ env.SOLN_FILE }}"

      - name: Compile solution
        run: dotnet build "${{ env.SOLN_FILE }}" -c "${{ env.CONFIG }}" --no-restore

      - name: Run Saucery.NuGet xUnit v3 unit tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/${{ env.COVERLET_DIR }}"

          dotnet run -c "${{ env.CONFIG }}" --project "${{ env.TEST_PROJECT }}" -- \
            --coverage \
            --coverage-output-format "${{ env.COVERAGE_FORMAT }}" \
            --coverage-output "${{ github.workspace }}/${{ env.COVERLET_DIR }}/${{ env.UNIT_COVERAGE_FILENAME }}"

      - name: Display workspace structure
        run: ls -R

      - name: Publish unit test artifact
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.UNIT_COVERAGE_FILENAME }}

  publish-saucery-nuget:
    name: Publish Saucery.NuGet to NuGet
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/master' && needs.build-and-test.result == 'success'
    outputs:
      local_version: ${{ steps.publish.outputs.version }}
      publish: ${{ steps.publish.outputs.publish }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - id: publish
        name: Publish Saucery.NuGet if local version is newer
        uses: ./.github/actions/publish-nuget-package
        with:
          project-path: ${{ env.PROJECT_PATH }}
          package-id: ${{ env.PACKAGE_ID }}
          configuration: ${{ env.CONFIG }}
          nupkg-dir: ${{ env.ARTIFACT_DIR }}
          nuget-api-key: ${{ secrets.NUGET_API_KEY }}
          publish-mode: local-version-newer
          build-mode: project

  tag:
    needs: publish-saucery-nuget
    if: ${{ needs.publish-saucery-nuget.outputs.publish == 'true' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master') }}
    runs-on: ubuntu-latest
    concurrency:
      group: saucery-nuget-${{ needs.publish-saucery-nuget.outputs.local_version }}
      cancel-in-progress: false
    steps:
      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.ACTIONS_PUSH_PAT }}
          tag_prefix: ""
          custom_tag: saucery-nuget-${{ needs.publish-saucery-nuget.outputs.local_version }}

  generate-report:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: needs.build-and-test.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download unit-test results
        uses: actions/download-artifact@v8
        with:
          name: unit-test-results

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.7
        with:
          reports: ${{ env.UNIT_COVERAGE_FILENAME }}
          targetdir: 'coveragereport'
          reporttypes: 'HtmlInline;Cobertura'

      - name: Upload coverage report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: CoverageReport
          path: coveragereport
