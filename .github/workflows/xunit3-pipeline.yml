name: XUnit3 Only

on:
  schedule:
    - cron: "0 1,7,13,19 * * *"
  push:
    paths:
      - '.github/workflows/xunit3-pipeline.yml'
    #  - '.github/actions/**'
      - 'Saucery.XUnit3/**'
      - 'Merlin.XUnit3/**'
      - 'Merlin.XUnit3.RealDevices/**'
    branches: [master, 'releases/**', 'feat/**', 'feature/**', 'fix/**', 'test/**']
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIG: Release
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  NUGET_USER: fullcircle
  COVERLET_DIR: ./TestResults
  UT_PROJECT: Saucery.Core.Tests.XUnitv3/Saucery.Core.Tests.XUnitv3.csproj
  TT_PROJECT: Template.Tests/Template.Tests.csproj
  M_XUNIT3_PROJECT: Merlin.XUnit3/Merlin.XUnit3.csproj
  M_RD_XUNIT3_PROJECT: Merlin.XUnit3.RealDevices/Merlin.XUnit3.RealDevices.csproj
  COVERAGE_FORMAT: cobertura
  UNIT_COVERAGE_FILENAME: cobertura.unit.xml
  XUNIT3_INTEGRATION_COVERAGE_FILENAME: cobertura.xunit3.integration.xml
  XUNIT3_RD_INTEGRATION_COVERAGE_FILENAME: cobertura.xunit3.realdevice.integration.xml
  WATCHED_GLOBS: |
    .github/workflows/xunit3-pipeline.yml
    .github/actions/**
    Saucery.XUnit3/**
    Merlin.XUnit3/**
    Merlin.XUnit3.RealDevices/**

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions: { actions: read, contents: read }
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      paths_changed: ${{ steps.detect.outputs.paths_changed }}
      previous_sha: ${{ steps.detect.outputs.previous_sha }}
    steps:
      - uses: actions/checkout@v6
      - id: detect
        uses: ./.github/actions/detect-watched-paths
        with:
          workflow-id: .github/workflows/xunit3-pipeline.yml
          watched-globs: ${{ env.WATCHED_GLOBS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    env:
      SAUCE_USER_NAME: ${{ secrets.SAUCE_USER_NAME }}
      SAUCE_API_KEY: ${{ secrets.SAUCE_API_KEY }}
    needs: detect-changes
    if: needs.detect-changes.outputs.paths_changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Compile solution
        run: dotnet build -c ${{ env.CONFIG }}
      - uses: ./.github/actions/run-xunit3-coverage
        with:
          project: ${{ env.UT_PROJECT }}
          configuration: ${{ env.CONFIG }}
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          coverage-output: ${{ env.UNIT_COVERAGE_FILENAME }}
      - uses: ./.github/actions/enable-test-report-upload
      - name: Run Template Tests
        run: dotnet run --project ${{ env.TT_PROJECT }} -- --treenode-filter '/*/*/*/*[Category=XUnit3]'
      - name: Publish Unit Test Results
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: Saucery.Core.Tests.XUnitv3/bin/${{ env.CONFIG }}/net10.0/TestResults/${{ env.UNIT_COVERAGE_FILENAME }}

  xunit3-integration-tests:
    runs-on: ubuntu-latest
    env:
      SAUCE_USER_NAME: ${{ secrets.SAUCE_USER_NAME }}
      SAUCE_API_KEY: ${{ secrets.SAUCE_API_KEY }}
    needs: build
    if: needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Restore dependencies
        run: dotnet restore --force
      - name: Build project
        run: dotnet build -c ${{ env.CONFIG }}
      - uses: ./.github/actions/run-xunit3-coverage
        with:
          project: ${{ env.M_XUNIT3_PROJECT }}
          configuration: ${{ env.CONFIG }}
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          coverage-output: ${{ env.XUNIT3_INTEGRATION_COVERAGE_FILENAME }}
      - name: Publish XUnit3 Integration Results
        uses: actions/upload-artifact@v7
        with:
          name: xunit3-integration-test-results
          path: Merlin.XUnit3/bin/${{ env.CONFIG }}/net10.0/TestResults/${{ env.XUNIT3_INTEGRATION_COVERAGE_FILENAME }}

  xunit3-real-integration-tests:
    runs-on: ubuntu-latest
    env:
      SAUCE_USER_NAME: ${{ secrets.SAUCE_USER_NAME }}
      SAUCE_API_KEY: ${{ secrets.SAUCE_API_KEY }}
    needs: build
    if: needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Restore dependencies
        run: dotnet restore --force
      - name: Build project
        run: dotnet build -c ${{ env.CONFIG }}
      - uses: ./.github/actions/run-xunit3-coverage
        with:
          project: ${{ env.M_RD_XUNIT3_PROJECT }}
          configuration: ${{ env.CONFIG }}
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          coverage-output: ${{ env.XUNIT3_RD_INTEGRATION_COVERAGE_FILENAME }}
      - name: Publish XUnit3 Real Integration Results
        uses: actions/upload-artifact@v7
        with:
          name: xunit3-real-integration-test-results
          path: Merlin.XUnit3.RealDevices/bin/${{ env.CONFIG }}/net10.0/TestResults/${{ env.XUNIT3_RD_INTEGRATION_COVERAGE_FILENAME }}

  publish-saucery-xunit3:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: nuget-publish
    needs: [xunit3-integration-tests, xunit3-real-integration-tests]
    if: github.ref == 'refs/heads/master' && needs.xunit3-integration-tests.result == 'success' && needs.xunit3-real-integration-tests.result == 'success'
    outputs:
      local_version: ${{ steps.publish.outputs.version }}
      publish: ${{ steps.publish.outputs.published }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet

      - id: publish
        uses: ./.github/actions/publish-saucery-package
        with:
          project-path: Saucery.XUnit3/Saucery.XUnit3.csproj
          package-id: Saucery.XUnit.v3
          configuration: ${{ env.CONFIG }}
          nupkg-dir: artifacts
          nuget-source: ${{ env.NUGET_SOURCE }}
          nuget-user: ${{ env.NUGET_USER }}
          publish-mode: local-version-newer

  tag:
    needs: publish-saucery-xunit3
    if: ${{ needs.publish-saucery-xunit3.outputs.publish == 'true' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: xunit3-${{ needs.publish-saucery-xunit3.outputs.local_version }}
      cancel-in-progress: false
    steps:
      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: ""
          custom_tag: xunit3-${{ needs.publish-saucery-xunit3.outputs.local_version }}

  generate-report:
    runs-on: ubuntu-latest
    needs: [xunit3-integration-tests, xunit3-real-integration-tests]
    if: needs.xunit3-integration-tests.result == 'success' && needs.xunit3-real-integration-tests.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - uses: actions/download-artifact@v8
        with: { name: unit-test-results }
      - uses: actions/download-artifact@v8
        with: { name: xunit3-integration-test-results }
      - uses: actions/download-artifact@v8
        with: { name: xunit3-real-integration-test-results }
      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
        with:
          reports: ${{ env.UNIT_COVERAGE_FILENAME }};${{ env.XUNIT3_INTEGRATION_COVERAGE_FILENAME }};${{ env.XUNIT3_RD_INTEGRATION_COVERAGE_FILENAME }}
          targetdir: coveragereport
          reporttypes: HtmlInline;Cobertura
      - name: Upload coverage report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: CoverageReport
          path: coveragereport
