name: Update NuGet total downloads badge

on:
  schedule:
    - cron: "0 2 * * *"  # daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-total-downloads-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Generate badge JSON
        run: dotnet run --project Saucery.Badges/Saucery.Badges.csproj

      - name: Commit and push if there are changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "agray"
          git config user.email "agray@users.noreply.github.com"
          export GIT_AUTHOR_NAME="agray"
          export GIT_AUTHOR_EMAIL="agray@users.noreply.github.com"
          export GIT_COMMITTER_NAME="agray"
          export GIT_COMMITTER_EMAIL="agray@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
             echo "✅ No changes detected after running NuGet Downloads Badge"
             exit 0
          fi

          git commit -m "Update Totals Badge"
          git pull --rebase origin master

          echo "Pushing changes with GITHUB_TOKEN..."
          git push origin HEAD:master

          echo "Changes committed and pushed to master."
