name: TUnit Only

on:
  schedule:
    - cron: "0 1,7,13,19 * * *"
  push:
    paths:
      - '.github/workflows/tunit-pipeline.yml'
      # - '.github/actions/**'
      - 'Saucery.TUnit/**'
      - 'Merlin.TUnit/**'
      - 'Merlin.TUnit.RealDevices/**'
    branches: [master, 'releases/**', 'feat/**', 'feature/**', 'fix/**', 'test/**', 'bug/**']
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIG: Release
  COVERLET_DIR: ./TestResults
  BUILD_ARTIFACTS: build-artifacts
  UT_PROJECT: Saucery.Core.Tests.XUnitv3/Saucery.Core.Tests.XUnitv3.csproj
  TT_PROJECT: Template.Tests/Template.Tests.csproj
  COVERAGE_FORMAT: cobertura
  UNIT_COVERAGE_FILENAME: cobertura.unit.xml
  TUNIT_INTEGRATION_COVERAGE_FILENAME: cobertura.tunit.integration.xml
  TUNIT_RD_INTEGRATION_COVERAGE_FILENAME: cobertura.tunit.realdevice.integration.xml
  PACKAGE_PROJECT: Saucery.TUnit/Saucery.TUnit.csproj
  PACKAGE_ID: Saucery.TUnit
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  NUGET_USER: fullcircle
  WATCHED_GLOBS: |
    .github/workflows/tunit-pipeline.yml
    .github/actions/**
    Saucery.TUnit/**
    Merlin.TUnit/**
    Merlin.TUnit.RealDevices/**

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions: { actions: read, contents: read }
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      paths_changed: ${{ steps.detect.outputs.paths_changed }}
      previous_sha: ${{ steps.detect.outputs.previous_sha }}
    steps:
      - uses: actions/checkout@v6

      - id: detect
        uses: ./.github/actions/detect-watched-paths
        with:
          workflow-id: .github/workflows/tunit-pipeline.yml
          watched-globs: ${{ env.WATCHED_GLOBS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    env:
      SAUCE_USER_NAME: ${{ secrets.SAUCE_USER_NAME }}
      SAUCE_API_KEY: ${{ secrets.SAUCE_API_KEY }}
    needs: detect-changes
    if: needs.detect-changes.outputs.paths_changed == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet

      - name: Compile solution
        run: dotnet build -c ${{ env.CONFIG }}

      - uses: ./.github/actions/enable-test-report-upload

      - uses: ./.github/actions/run-xunit3-coverage
        with:
          project: ${{ env.UT_PROJECT }}
          configuration: ${{ env.CONFIG }}
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          coverage-output: ${{ env.UNIT_COVERAGE_FILENAME }}

      - name: Run Template Tests
        run: dotnet run --project ${{ env.TT_PROJECT }} -- --treenode-filter '/*/*/*/*[Category=TUnit]'

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUILD_ARTIFACTS }}
          path: |
            **/bin/${{ env.CONFIG }}/**/
            **/obj/

      - name: Publish Unit Test Results
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: Saucery.Core.Tests.XUnitv3/bin/${{ env.CONFIG }}/net10.0/TestResults/${{ env.UNIT_COVERAGE_FILENAME }}

  tunit-integration-tests:
    runs-on: ubuntu-latest
    env:
      SAUCE_USER_NAME: ${{ secrets.SAUCE_USER_NAME }}
      SAUCE_API_KEY: ${{ secrets.SAUCE_API_KEY }}
    needs: build
    if: needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BUILD_ARTIFACTS }}
          path: ${{ env.BUILD_ARTIFACTS }}

      - uses: ./.github/actions/enable-test-report-upload

      - uses: ./.github/actions/run-dotnet-dll-coverage
        with:
          search-root: ${{ github.workspace }}/${{ env.BUILD_ARTIFACTS }}
          dll-name: Merlin.TUnit.dll
          runtimeconfig-name: Merlin.TUnit.runtimeconfig.json
          runner-kind: tunit
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          results-directory: ${{ env.COVERLET_DIR }}
          coverage-output: ${{ github.workspace }}/${{ env.COVERLET_DIR }}/${{ env.TUNIT_INTEGRATION_COVERAGE_FILENAME }}

      - name: Publish TUnit Integration Results
        uses: actions/upload-artifact@v7
        with:
          name: tunit-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.TUNIT_INTEGRATION_COVERAGE_FILENAME }}

  tunit-real-integration-tests:
    runs-on: ubuntu-latest
    env:
      SAUCE_USER_NAME: ${{ secrets.SAUCE_USER_NAME }}
      SAUCE_API_KEY: ${{ secrets.SAUCE_API_KEY }}
    needs: build
    if: needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BUILD_ARTIFACTS }}
          path: ${{ env.BUILD_ARTIFACTS }}

      - uses: ./.github/actions/enable-test-report-upload

      - uses: ./.github/actions/run-dotnet-dll-coverage
        with:
          search-root: ${{ github.workspace }}/${{ env.BUILD_ARTIFACTS }}
          dll-name: Merlin.TUnit.RealDevices.dll
          runtimeconfig-name: Merlin.TUnit.RealDevices.runtimeconfig.json
          runner-kind: tunit
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          results-directory: ${{ env.COVERLET_DIR }}
          coverage-output: ${{ github.workspace }}/${{ env.COVERLET_DIR }}/${{ env.TUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}

      - name: Publish TUnit Real Integration Results
        uses: actions/upload-artifact@v7
        with:
          name: tunit-real-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.TUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}

  publish-saucery-tunit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: nuget-publish
    needs: [tunit-integration-tests, tunit-real-integration-tests]
    if: github.ref == 'refs/heads/master' && needs.tunit-integration-tests.result == 'success' && needs.tunit-real-integration-tests.result == 'success'
    outputs:
      local_version: ${{ steps.publish.outputs.version }}
      publish: ${{ steps.publish.outputs.published }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet

      - id: publish
        uses: ./.github/actions/publish-saucery-package
        with:
          project-path: Saucery.TUnit/Saucery.TUnit.csproj
          package-id: Saucery.TUnit
          configuration: ${{ env.CONFIG }}
          nupkg-dir: artifacts
          nuget-source: ${{ env.NUGET_SOURCE }}
          nuget-user: ${{ env.NUGET_USER }}
          publish-mode: local-version-newer

  tag:
    needs: publish-saucery-tunit
    if: ${{ needs.publish-saucery-tunit.outputs.publish == 'true' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: tunit-${{ needs.publish-saucery-tunit.outputs.local_version }}
      cancel-in-progress: false
    steps:
      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: ""
          custom_tag: tunit-${{ needs.publish-saucery-tunit.outputs.local_version }}

  generate-report:
    runs-on: ubuntu-latest
    needs: [tunit-integration-tests, tunit-real-integration-tests]
    if: needs.tunit-integration-tests.result == 'success' && needs.tunit-real-integration-tests.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-dotnet

      - uses: actions/download-artifact@v8
        with:
          name: unit-test-results
          path: ${{ env.COVERLET_DIR }}

      - uses: actions/download-artifact@v8
        with:
          name: tunit-integration-test-results
          path: ${{ env.COVERLET_DIR }}

      - uses: actions/download-artifact@v8
        with:
          name: tunit-real-integration-test-results
          path: ${{ env.COVERLET_DIR }}

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.9
        with:
          reports: '${{ env.COVERLET_DIR }}/${{ env.UNIT_COVERAGE_FILENAME }};${{ env.COVERLET_DIR }}/${{ env.TUNIT_INTEGRATION_COVERAGE_FILENAME }};${{ env.COVERLET_DIR }}/${{ env.TUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}'
          targetdir: coveragereport
          reporttypes: HtmlInline;Cobertura

      - name: Upload coverage report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: CoverageReport
          path: coveragereport

  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [generate-report, publish-saucery-tunit]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/delete-run-artifact
        with:
          artifact-name: ${{ env.BUILD_ARTIFACTS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}