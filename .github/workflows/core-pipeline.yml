name: Saucery.Core Pipeline

on:
  pull_request:
    branches: ['**']
  push:
    paths:
      - '.github/workflows/core-pipeline.yml'
      - '.github/actions/**'
      - 'Saucery.Core/**'
    branches: [master, 'releases/**', 'feat/**', 'feature/**', 'fix/**', 'test/**', 'bug/**']
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

run-name: ${{ github.event.head_commit.message || github.event.inputs.message || 'Manual Run' }}

permissions:
  contents: write

env:
  PROJECT_NAME: Saucery
  SOLN_FILE: Saucery.sln
  COVERLET_DIR: ./TestResults
  CONFIG: Release
  BUILD_ARTIFACTS: build-artifacts
  COVERAGE_FORMAT: cobertura

  UT_PROJECT: Saucery.Core.Tests.XUnitv3/Saucery.Core.Tests.XUnitv3.csproj
  TT_PROJECT: Template.Tests/Template.Tests.csproj
  M_NUNIT_PROJECT: Merlin.NUnit/Merlin.NUnit.csproj
  M_RD_NUNIT_PROJECT: Merlin.NUnit.RealDevices/Merlin.NUnit.RealDevices.csproj
  M_XUNIT_PROJECT: Merlin.XUnit/Merlin.XUnit.csproj
  M_RD_XUNIT_PROJECT: Merlin.XUnit.RealDevices/Merlin.XUnit.RealDevices.csproj

  UNIT_COVERAGE_FILENAME: opencover.unit.xml
  NUNIT_INTEGRATION_COVERAGE_FILENAME: opencover.nunit.integration.xml
  XUNIT_INTEGRATION_COVERAGE_FILENAME: opencover.xunit.integration.xml
  NUNIT_RD_INTEGRATION_COVERAGE_FILENAME: opencover.nunit.realdevice.integration.xml
  XUNIT_RD_INTEGRATION_COVERAGE_FILENAME: opencover.xunit.realdevice.integration.xml
  XUNIT3_INTEGRATION_COVERAGE_FILENAME: opencover.xunit3.integration.xml
  XUNIT3_RD_INTEGRATION_COVERAGE_FILENAME: opencover.xunit3.realdevice.integration.xml
  TUNIT_INTEGRATION_COVERAGE_FILENAME: opencover.tunit.integration.xml
  TUNIT_RD_INTEGRATION_COVERAGE_FILENAME: opencover.tunit.realdevice.integration.xml

  SAUCE_USER_NAME: ${{ secrets.SAUCE_USER_NAME }}
  SAUCE_API_KEY: ${{ secrets.SAUCE_API_KEY }}
  CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Restore solution
        run: dotnet restore
      - name: Compile solution
        run: dotnet build -c ${{ env.CONFIG }} --no-restore
      - uses: ./.github/actions/run-xunit3-coverage
        with:
          project: ${{ env.UT_PROJECT }}
          configuration: ${{ env.CONFIG }}
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          coverage-output: ${{ env.UNIT_COVERAGE_FILENAME }}
      - uses: ./.github/actions/enable-test-report-upload
      - name: Run Template Tests
        run: dotnet run -c ${{ env.CONFIG }} --project ${{ env.TT_PROJECT }} --no-build
      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUILD_ARTIFACTS }}
          path: |
            **/bin/${{ env.CONFIG }}/**/
            **/obj/
      - name: Publish Unit Test Results
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: Saucery.Core.Tests.XUnitv3/bin/${{ env.CONFIG }}/net10.0/TestResults/${{ env.UNIT_COVERAGE_FILENAME }}

  xunit3-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BUILD_ARTIFACTS }}
          path: .
      - uses: ./.github/actions/run-dotnet-dll-coverage
        with:
          search-root: Merlin.XUnit3
          dll-name: Merlin.XUnit3.dll
          runtimeconfig-name: Merlin.XUnit3.runtimeconfig.json
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          results-directory: ${{ env.COVERLET_DIR }}
          coverage-output: ${{ env.XUNIT3_INTEGRATION_COVERAGE_FILENAME }}
      - uses: actions/upload-artifact@v7
        with:
          name: xunit3-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.XUNIT3_INTEGRATION_COVERAGE_FILENAME }}

  xunit3-real-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BUILD_ARTIFACTS }}
          path: .
      - uses: ./.github/actions/run-dotnet-dll-coverage
        with:
          search-root: Merlin.XUnit3.RealDevices
          dll-name: Merlin.XUnit3.RealDevices.dll
          runtimeconfig-name: Merlin.XUnit3.RealDevices.runtimeconfig.json
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          results-directory: ${{ env.COVERLET_DIR }}
          coverage-output: ${{ env.XUNIT3_RD_INTEGRATION_COVERAGE_FILENAME }}
      - uses: actions/upload-artifact@v7
        with:
          name: xunit3-real-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.XUNIT3_RD_INTEGRATION_COVERAGE_FILENAME }}

  xunit-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with: { name: '${{ env.BUILD_ARTIFACTS }}', path: . }
      - uses: ./.github/actions/run-coverlet-project
        with:
          test-project: ${{ env.M_XUNIT_PROJECT }}
          output: ${{ env.XUNIT_INTEGRATION_COVERAGE_FILENAME }}
          output-format: ${{ env.COVERAGE_FORMAT }}
          excludes: '[Merlin.XUnit]Tests.*'
      - uses: actions/upload-artifact@v7
        with:
          name: xunit-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.XUNIT_INTEGRATION_COVERAGE_FILENAME }}

  nunit-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with: { name: '${{ env.BUILD_ARTIFACTS }}', path: . }
      - uses: ./.github/actions/run-coverlet-project
        with:
          test-project: ${{ env.M_NUNIT_PROJECT }}
          output: ${{ env.NUNIT_INTEGRATION_COVERAGE_FILENAME }}
          output-format: ${{ env.COVERAGE_FORMAT }}
          excludes: '[Merlin.NUnit]Tests.*'
      - uses: actions/upload-artifact@v7
        with:
          name: nunit-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.NUNIT_INTEGRATION_COVERAGE_FILENAME }}

  nunit-real-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with: { name: '${{ env.BUILD_ARTIFACTS }}', path: . }
      - uses: ./.github/actions/run-coverlet-project
        with:
          test-project: ${{ env.M_RD_NUNIT_PROJECT }}
          output: ${{ env.NUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}
          output-format: ${{ env.COVERAGE_FORMAT }}
          excludes: '[Merlin.NUnit.RealDevices]Tests.*'
      - uses: actions/upload-artifact@v7
        with:
          name: nunit-real-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.NUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}

  xunit-real-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with: { name: '${{ env.BUILD_ARTIFACTS }}', path: . }
      - uses: ./.github/actions/run-coverlet-project
        with:
          test-project: ${{ env.M_RD_XUNIT_PROJECT }}
          output: ${{ env.XUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}
          output-format: ${{ env.COVERAGE_FORMAT }}
          excludes: '[Merlin.XUnit.RealDevices]Tests.*'
      - uses: actions/upload-artifact@v7
        with:
          name: xunit-real-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.XUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}

  tunit-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with: { name: '${{ env.BUILD_ARTIFACTS }}', path: '${{ env.BUILD_ARTIFACTS }}' }
      - uses: ./.github/actions/enable-test-report-upload
      - uses: ./.github/actions/run-dotnet-dll-coverage
        with:
          search-root: ${{ github.workspace }}/${{ env.BUILD_ARTIFACTS }}
          dll-name: Merlin.TUnit.dll
          runtimeconfig-name: Merlin.TUnit.runtimeconfig.json
          runner-kind: tunit
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          results-directory: ${{ env.COVERLET_DIR }}
          coverage-output: ${{ github.workspace }}/${{ env.COVERLET_DIR }}/${{ env.TUNIT_INTEGRATION_COVERAGE_FILENAME }}
      - uses: actions/upload-artifact@v7
        with:
          name: tunit-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.TUNIT_INTEGRATION_COVERAGE_FILENAME }}

  tunit-real-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with: { name: '${{ env.BUILD_ARTIFACTS }}', path: '${{ env.BUILD_ARTIFACTS }}' }
      - uses: ./.github/actions/enable-test-report-upload
      - uses: ./.github/actions/run-dotnet-dll-coverage
        with:
          search-root: ${{ github.workspace }}/${{ env.BUILD_ARTIFACTS }}
          dll-name: Merlin.TUnit.RealDevices.dll
          runtimeconfig-name: Merlin.TUnit.RealDevices.runtimeconfig.json
          runner-kind: tunit
          coverage-format: ${{ env.COVERAGE_FORMAT }}
          results-directory: ${{ env.COVERLET_DIR }}
          coverage-output: ${{ github.workspace }}/${{ env.COVERLET_DIR }}/${{ env.TUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}
      - uses: actions/upload-artifact@v7
        with:
          name: tunit-real-integration-test-results
          path: ${{ env.COVERLET_DIR }}/${{ env.TUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}

  publish-saucery-core:
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    needs: [xunit-integration-tests, nunit-integration-tests]
    outputs:
      local_version: ${{ steps.publish.outputs.local_version }}
      publish: ${{ steps.publish.outputs.publish }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with: { name: '${{ env.BUILD_ARTIFACTS }}' }
      - id: publish
        uses: ./.github/actions/publish-nuget-if-newer
        with:
          project-path: Saucery.Core/Saucery.Core.csproj
          package-id: Saucery.Core
          build-configuration: ${{ env.CONFIG }}
          artifact-dir: artifacts
          pack-no-build: 'true'
          nuget-api-key: ${{ secrets.NUGET_API_KEY }}

  generate-report:
    runs-on: ubuntu-latest
    needs: [xunit-integration-tests, nunit-integration-tests, xunit-real-integration-tests, nunit-real-integration-tests, xunit3-integration-tests, xunit3-real-integration-tests, tunit-integration-tests, tunit-real-integration-tests]
    if: ${{ always() && needs.xunit-integration-tests.result == 'success' && needs.nunit-integration-tests.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dotnet
      - uses: actions/download-artifact@v8
        with: { name: unit-test-results, path: '${{ env.COVERLET_DIR }}' }
      - uses: actions/download-artifact@v8
        with: { name: nunit-integration-test-results, path: '${{ env.COVERLET_DIR }}' }
      - uses: actions/download-artifact@v8
        with: { name: xunit-integration-test-results, path: '${{ env.COVERLET_DIR }}' }
      - uses: actions/download-artifact@v8
        with: { name: nunit-real-integration-test-results, path: '${{ env.COVERLET_DIR }}' }
      - uses: actions/download-artifact@v8
        with: { name: xunit-real-integration-test-results, path: '${{ env.COVERLET_DIR }}' }
      - uses: actions/download-artifact@v8
        with: { name: tunit-integration-test-results, path: '${{ env.COVERLET_DIR }}' }
      - uses: actions/download-artifact@v8
        with: { name: tunit-real-integration-test-results, path: '${{ env.COVERLET_DIR }}' }
      - uses: actions/download-artifact@v8
        with: { name: xunit3-integration-test-results, path: '${{ env.COVERLET_DIR }}' }
      - uses: actions/download-artifact@v8
        with: { name: xunit3-real-integration-test-results, path: '${{ env.COVERLET_DIR }}' }
      - name: List downloaded coverage files
        run: ls -la '${{ env.COVERLET_DIR }}' || true
      - name: Setup Java JDK for Codacy Code Coverage
        uses: actions/setup-java@v5.2.0
        with:
          distribution: oracle
          java-version: '21'
      - name: Codacy Code Coverage
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report -l CSharp \
            -r "${{ env.COVERLET_DIR }}/${{ env.UNIT_COVERAGE_FILENAME }}" \
            -r "${{ env.COVERLET_DIR }}/${{ env.NUNIT_INTEGRATION_COVERAGE_FILENAME }}" \
            -r "${{ env.COVERLET_DIR }}/${{ env.XUNIT_INTEGRATION_COVERAGE_FILENAME }}" \
            -r "${{ env.COVERLET_DIR }}/${{ env.XUNIT3_INTEGRATION_COVERAGE_FILENAME }}" \
            -r "${{ env.COVERLET_DIR }}/${{ env.TUNIT_INTEGRATION_COVERAGE_FILENAME }}" \
            -r "${{ env.COVERLET_DIR }}/${{ env.NUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}" \
            -r "${{ env.COVERLET_DIR }}/${{ env.XUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}" \
            -r "${{ env.COVERLET_DIR }}/${{ env.XUNIT3_RD_INTEGRATION_COVERAGE_FILENAME }}" \
            -r "${{ env.COVERLET_DIR }}/${{ env.TUNIT_RD_INTEGRATION_COVERAGE_FILENAME }}"
      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.7
        with:
          reports: '${{ env.COVERLET_DIR }}/opencover*.xml'
          targetdir: coveragereport
          reporttypes: HtmlInline;Cobertura
      - name: Upload coverage report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: CoverageReport
          path: coveragereport

  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: [generate-report, publish-saucery-core]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/delete-run-artifact
        with:
          artifact-name: ${{ env.BUILD_ARTIFACTS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
